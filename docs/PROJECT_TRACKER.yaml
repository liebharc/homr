known_traps:
- Track A and Track B self-consistency results compare against clean ONNX predictions and are not ground-truth MusicXML accuracy.
- Do not interpret HOMR deterministic layout console messages as forbidden neural inference.
- Do not use dataset/cache_staff_crops.py for final Track B inputs; it produces raw crop PNGs, not prepare_staff_image outputs.
- Do not rerun full layout on Track B adversarial prepared staff images.
- Do not cap raw SER/CER in statistics_engine.py.
- PowerShell paths containing attacks/python scripts must be quoted.
- ONNX Runtime CUDA Memcpy-node warnings are performance warnings, not correctness failures.
- Do not interpret alpha as three independent epsilons. In the multiscale Track A design, alpha biases the distribution of spectral mixture weights
  while epsilon_phys remains the only severity parameter.
- When --plot is passed to Track A, metrics JSON must be written before plotting; plotting failure is nonfatal and the plotter can be run manually
  from attacks/python scripts/plot_results.py.
