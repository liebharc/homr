agent_instructions:
  first_read: true
  agent_goal: Use this tracker to decide the next concrete action without requiring the user to re-explain the project.
  required_behavior:
  - Read this file first before asking for more files.
  - If a file must be created or replaced, provide the full implementation, not a scaffold, placeholder, dummy, sample-only file, or partial snippet.
  - If more context is needed, ask for specific files by exact path, not broad folders or the whole repo.
  - If a command should be run, give the exact command and explain what output is needed.
  - Do not mark a task done unless the user reports that its check command succeeded or provides equivalent evidence.
  - When reporting benchmark results, clearly distinguish clean_onnx_prediction self-consistency scoring from MusicXML ground-truth scoring.
  - After tracker edits, tell the user to run python scripts/update_project_tracker.py --write.
  forbidden_behavior:
  - Do not silently substitute HOMR Python neural inference for ONNX Runtime inference.
  - Do not use Staff2Score.predict, get_decoder, Encoder, parse_staff_tromr, or homr.segmentation.inference_segnet.extract in benchmark inference
    code.
  - Do not tell the user to upload huge generated/data/model directories.
  - Do not create placeholder implementations and call them complete.
  - Do not mark empty files as implemented.
  - Do not treat generated caches or result files as source code.
project_summary:
  name: adversarial-homr
  purpose: Adversarial robustness benchmark for HOMR under natural image degradation and black-box adversarial perturbation.
  benchmark_type: ONNX-only neural inference with deterministic HOMR Python geometry.
  current_phase: Track B real recognition-stage attack is running or resumable; do not restart it just to apply plotting-path patches. Track A
    has moved from scalar-alpha colored-noise smoke testing to a multiscale Fourier-mixture spectral degradation design. Current Track A replacement
    files should implement endpoint interpolation, epsilon×alpha sweeping, alpha-conditioned mixture weights, Track-B-style logging, and automatic
    plotting via the canonical plotter path.
  major_tracks:
    track_a:
      name: Natural OOD full-page spectral degradation
      status: multiscale-implementation-provided-needs-local-replace-and-smoke
      mode: A2_SELF_CONSISTENCY_MULTISCALE
      description: 'Inject a single continuous multiscale Fourier-mixture degradation field into full-page images. The exposed scientific axes
        are epsilon_phys and alpha: epsilon is global severity, while alpha biases the random white/pink/brown spectral mixture. The mixed field
        is normalized and applied via endpoint interpolation so negative values can move pixels toward black and positive values can move pixels
        toward white. Then rerun ONNX SegNet plus deterministic HOMR layout, prepare staff images, run ONNX TrOMR encoder/decoder, and compare
        noisy predictions against clean ONNX predictions until MusicXML ground-truth token alignment is implemented.'
      latest_smoke_evidence:
        command: python attacks/run_spectral_sweep.py --max-images 1 --epsilon 0.0 0.05 --alpha 1.0 --output-json results/logs/TRACK_A_SMOKE_metrics.json
          --plot --plots-dir results/plots --continue-on-error
        result: passed
        epsilon_0_mean_ser: 0.0
        epsilon_0_mean_cer: 0.0
        epsilon_005_mean_ser: 0.095118
        epsilon_005_mean_cer: 0.00477
        staff_pairs: 6
        outputs:
        - results/logs/TRACK_A_SMOKE_metrics.json
        - results/plots/spectral_ser_cer.html
      latest_design_update:
        date: '2026-05-31'
        decision: Use one continuous multiscale Fourier-mixture noising model; do not add categorical degradation modes.
        sweep_axes:
        - epsilon_phys
        - alpha
        not_swept:
        - epsilon_white
        - epsilon_pink
        - epsilon_brown
        - anisotropy
        - theta
        implementation_artifacts:
        - spectral_noise_multiscale.py
        - run_spectral_sweep_multiscale.py
        - plot_results_multiscale.py
        auto_plot: run_spectral_sweep.py should call the canonical plotter automatically when --plot is passed, after the metrics JSON is safely
          written.
    track_b:
      name: Post-layout TrOMR recognition-stage Square Attack
      status: running-real-attack
      description: Attack cached HOMR-prepared TrOMR staff inputs using zero-order Square Attack and ONNX encoder/decoder queries. Current real
        run uses clean_onnx_prediction self-consistency targets, max_staffs=1000, epsilon_math={0.10,0.20,0.30,0.40}, n_max=20, checkpoint/resume,
        JSON/JSONL logging, and raw+capped SER/CER fields.
decisions:
- id: D001
  topic: ONNX boundary
  decision: All neural inference in benchmark mode must go through ONNX Runtime. HOMR Python is allowed only for deterministic preprocessing,
    geometry, dewarping, prepare_staff_image, vocabulary/token utilities, and MusicXML assembly when fed ONNX-decoded symbols.
- id: D002
  topic: HOMR console messages
  decision: Messages such as Creating bounds, Found staffs, and Dewarping staff come from allowed deterministic HOMR layout code. They do not
    by themselves indicate forbidden Python neural inference.
- id: D003
  topic: Track B scope
  decision: Track B is post-layout TrOMR recognition-stage only. It attacks cached outputs of prepare_staff_image and does not attack SegNet or
    full-page layout.
- id: D004
  topic: Track B run management
  decision: Do not restart the current Track B real run for plotting-path patches. Let it finish or resume from checkpoint if interrupted. If
    auto-plot fails at the end, manually run the plotter on the saved metrics JSON.
- id: D005
  topic: Track A scoring
  decision: Track A currently uses clean_onnx_prediction self-consistency scoring because cached metadata gt_tokens are empty and validated MusicXML
    staff-token alignment is not implemented. Do not report these results as MusicXML ground-truth accuracy.
- id: D006
  topic: SER/CER values
  decision: Raw SER/CER are normalized Levenshtein distances and may exceed 1.0 due to insertions. Preserve raw metrics as scientific measurements;
    add capped min(metric,1.0) fields only for bounded visualization.
- id: D007
  topic: Plotter location
  decision: The canonical local plotter path is attacks/python scripts/plot_results.py, not attacks/plot_results.py. Runners and commands should
    support this path.
- id: D008
  topic: Track A reporting
  decision: 'Track A reporting should be upgraded to Track-B-style outputs: aggregate spectral_noise_results, image_level_results, staff_level_results,
    errors, raw/capped metrics, clean baselines, deltas, layout success/match stats, runtime stats, CSV tables, and HTML plots.'
- id: D009
  topic: ONNX import guard
  decision: HOMR deterministic layout imports may load module names such as staff_parsing_tromr as import side effects. The benchmark violation
    is calling forbidden neural inference, not merely having an import name in sys.modules. Track A should construct the wrapper before layout
    helper import or otherwise avoid over-broad import-presence failures while still forbidding neural calls.
- id: D010
  topic: Track A multiscale spectral model
  decision: Track A should use one continuous multiscale Fourier-mixture degradation model rather than categorical modes. Generate white/pink/brown
    component fields, sample alpha-conditioned mixture weights per image/condition, combine and normalize the field, then apply endpoint interpolation
    toward black/white.
- id: D011
  topic: Track A sweep axes
  decision: Track A should sweep epsilon_phys × alpha. Epsilon is the single global severity parameter; alpha biases the spectral mixture distribution.
    Do not sweep separate epsilon_white, epsilon_pink, and epsilon_brown because that creates a 5^3-style grid and changes the interpretation
    of epsilon.
- id: D012
  topic: Endpoint interpolation semantics
  decision: Track A physical degradation should not be simple additive clipping only. The mixed signed field should allow negative values to move
    pixels continuously toward pure black and positive values to move pixels continuously toward pure white, with intermediate values preserved.
- id: D013
  topic: Track A automatic plotting
  decision: run_spectral_sweep.py should automatically invoke the plotter when --plot is passed, analogous to Track B. Metrics JSON must be written
    first; plotting failure should be nonfatal. The canonical plotter path remains attacks/python scripts/plot_results.py and PowerShell commands
    must quote it.
onnx_boundary_policy:
  summary: All neural network inference in benchmark mode must go through ONNX Runtime. HOMR Python may be used only for deterministic preprocessing,
    geometry, postprocessing, vocabulary, and MusicXML assembly.
  required_neural_graphs:
    segnet:
      file: models/onnx/segnet.onnx
      required_runtime: ONNX Runtime
      confirmed_input: '[batch_size, 3, 320, 320]'
      confirmed_output: '[batch_size, 6, 320, 320]'
    tromr_encoder:
      file: models/onnx/tromr_encoder.onnx
      required_runtime: ONNX Runtime
      confirmed_input: '[1, 1, 256, 1280]'
      confirmed_output: '[1, 1280, 512]'
    tromr_decoder:
      file: models/onnx/tromr_decoder.onnx
      required_runtime: ONNX Runtime
      confirmed_inputs:
      - rhythms
      - pitchs
      - lifts
      - articulations
      - context
      - cache_len
      - cache_in0 through cache_in31
      confirmed_outputs:
      - out_rhythms
      - out_pitchs
      - out_lifts
      - out_positions
      - out_articulations
      - attention
      - cache_out0 through cache_out31
  allowed_homr_usage:
  - autocrop, resize, CLAHE, image conversion
  - SegNet mask postprocessing after ONNX output
  - InputPredictions container
  - OpenCV/NumPy filtering and morphology
  - bounding boxes, ellipses, contours
  - staff detection and geometry
  - barline, notehead, stem, clef, brace/bracket deterministic logic
  - staff dewarping
  - StaffRegions
  - homr.staff_parsing.prepare_staff_image
  - Config for constants and vocabulary sizes
  - Vocabulary and EncodedSymbol for deterministic token decoding
  forbidden_benchmark_usage:
  - homr.segmentation.inference_segnet.extract
  - homr.transformer.staff2score.Staff2Score.predict
  - homr.transformer.encoder_inference.Encoder for benchmark inference
  - homr.transformer.decoder_inference.get_decoder for benchmark inference
  - homr.staff_parsing_tromr.parse_staff_tromr
  - homr.staff_parsing.parse_staffs when it triggers parse_staff_tromr
  - PyTorch model inference
  - TensorFlow model inference
